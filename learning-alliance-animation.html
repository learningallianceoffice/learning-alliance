<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Alliance — Logo Animation</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  transition: background 0.4s;
}

.stage {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

#logo-svg {
  width: 560px;
  height: 560px;
  overflow: visible;
}

/* =========================================
   TEAL A — clips up from bottom
   ========================================= */
#a-clip-rect {
  transform: translateY(750px);
  animation: clipUp 0.7s 0.1s cubic-bezier(0.4, 0, 0.15, 1) forwards;
}
@keyframes clipUp { to { transform: translateY(0); } }

/* =========================================
   GREEN OUTLINE+ARROW SHAPE
   Drawn from apex downward along left leg,
   then shoots right across as the bar
   ========================================= */
#arrow-path {
  stroke-dasharray: 2400;
  stroke-dashoffset: 2400;
  /* We animate fill separately — first draw the stroke outline then fill */
  fill: none;
  stroke: #7fc202;
  stroke-width: 1;
  animation: drawOutline 0.9s 0.7s ease-out forwards;
}
@keyframes drawOutline { to { stroke-dashoffset: 0; } }

/* Fill floods in after stroke draws */
#arrow-fill {
  opacity: 0;
  animation: fillFlood 0.25s 1.5s ease-out forwards;
}
@keyframes fillFlood { to { opacity: 1; } }

/* =========================================
   APEX GREEN STRIP (left edge tiny triangle)
   ========================================= */
#apex-fill {
  opacity: 0;
  animation: fadeIn 0.2s 1.5s forwards;
}

/* =========================================
   CHEVRONS — slide in from left with bounce
   ========================================= */
#chev2 {
  opacity: 0;
  transform: translateX(-30px);
  animation: chevPop 0.35s 1.72s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
#chev1 {
  opacity: 0;
  transform: translateX(-30px);
  animation: chevPop 0.35s 1.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes chevPop { to { opacity: 1; transform: translateX(0); } }

/* =========================================
   LEARNING — each letter rises from below
   Letters: L E A R N I N G
   ========================================= */
.ll {
  opacity: 0;
  transform: translateY(28px);
}
/* stagger: 80ms apart, starting at 1.55s */
#ll0 { animation: letterUp 0.45s 1.55s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#ll1 { animation: letterUp 0.45s 1.63s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#ll2 { animation: letterUp 0.45s 1.71s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#ll3 { animation: letterUp 0.45s 1.79s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#ll4 { animation: letterUp 0.45s 1.87s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#ll5 { animation: letterUp 0.45s 1.95s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#ll6 { animation: letterUp 0.45s 2.03s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#ll7 { animation: letterUp 0.45s 2.11s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

/* =========================================
   ALLIANCE — each letter rises from below
   Letters: A L L I A N C E
   Starts slightly after LEARNING
   ========================================= */
.al {
  opacity: 0;
  transform: translateY(28px);
}
#al0 { animation: letterUp 0.45s 1.85s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#al1 { animation: letterUp 0.45s 1.93s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#al2 { animation: letterUp 0.45s 2.01s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#al3 { animation: letterUp 0.45s 2.09s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#al4 { animation: letterUp 0.45s 2.17s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#al5 { animation: letterUp 0.45s 2.25s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#al6 { animation: letterUp 0.45s 2.33s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#al7 { animation: letterUp 0.45s 2.41s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

@keyframes letterUp { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn   { to { opacity: 1; } }

/* =========================================
   FINAL SETTLE — whole logo micro-pulse
   ========================================= */
#logo-svg {
  animation: settle 0.5s 2.85s ease-in-out both;
}
@keyframes settle {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.018); }
  100% { transform: scale(1); }
}

/* =========================================
   CONTROLS
   ========================================= */
.controls {
  margin-top: 28px;
  display: flex;
  gap: 12px;
}
button {
  background: transparent;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 10px 22px;
  font-size: 13px;
  cursor: pointer;
  color: #555;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
button:hover { background: #f5f5f5; border-color: #aaa; }
#btn-replay {
  background: #02808a;
  color: #fff;
  border-color: #02808a;
}
#btn-replay:hover { background: #016d77; border-color: #016d77; }
</style>
</head>

<div class="controls">
  <button id="btn-replay" onclick="replay()">↺ Replay</button>
  <button id="btn-bg" onclick="toggleBg()">Dark background</button>
</div>

<script>
  let dark = false;

  function replay() {
    const svg = document.getElementById('logo-svg');
    const parent = svg.parentNode;
    const clone = svg.cloneNode(true);
    clone.id = 'logo-svg';
    parent.replaceChild(clone, svg);
    // re-wire replay button since clone lost event listeners via onclick attr — fine, onclick is HTML attr
  }

  function toggleBg() {
    dark = !dark;
    document.body.style.background = dark ? '#111111' : '#ffffff';
    document.getElementById('btn-bg').textContent = dark ? 'White background' : 'Dark background';
  }
</script>
